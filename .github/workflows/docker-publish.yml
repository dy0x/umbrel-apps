name: Build and push Bisq image

on:
  push:
    branches: ["master"]
    paths:
      - "dy-bisq/**"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/dy0x/bisq-umbrel

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./dy-bisq
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:1.9.22
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
