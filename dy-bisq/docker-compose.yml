services:

  app_proxy:
    environment:
      APP_HOST: dy-bisq_web_1
      APP_PORT: 3003

  web:
    image: ghcr.io/dy0x/bisq-umbrel:1.9.22
    restart: on-failure
    environment:
      - PASSWORD=bisq
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - TITLE=Bisq
      - S6_CMD_WAIT_FOR_SERVICES_MAXTIME=0
      - S6_VERBOSITY=1
      - CUSTOM_PORT=3003
    volumes:
      - ${APP_DATA_DIR}/data:/config
